[package]
name = "cairn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
description = "Local, symbol-aware code index for AI coding agents."
keywords = ["code-search", "code-index", "mcp", "lsp", "claude-code"]
categories = ["development-tools", "command-line-utilities"]

[[bin]]
name = "cairn"
path = "src/main.rs"

[dependencies]
cairn-core.workspace = true
cairn-lang-api.workspace = true
cairn-proto.workspace = true
# Pull language backends into the link line so linkme's distributed
# slice picks up their registration constructors. The crates themselves
# do not need to be referenced from Rust code.
cairn-lang-csharp.workspace = true
cairn-lang-rust.workspace = true
cairn-lang-rust-tier3.workspace = true
cairn-lang-python.workspace = true
cairn-lang-python-tier3.workspace = true
cairn-lang-markdown.workspace = true
cairn-lang-php.workspace = true
cairn-lang-ruby.workspace = true
cairn-lang-typescript.workspace = true
cairn-lang-go.workspace = true
cairn-lang-go-tier3.workspace = true
cairn-lang-clangd-tier3.workspace = true
cairn-lang-c.workspace = true
cairn-lang-cpp.workspace = true
cairn-lang-java.workspace = true
cairn-lang-kotlin.workspace = true
cairn-lang-swift.workspace = true
cairn-lang-objc.workspace = true
clap.workspace = true
tokio.workspace = true
anyhow.workspace = true
async-trait = "0.1"
linkme.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true

[package.metadata.deb]
maintainer = "Naoto Morishima"
depends = "$auto, systemd"
section = "utils"
priority = "optional"
assets = [
    ["../../target/release/cairn", "usr/bin/cairn", "755"],
    ["../../README.md", "usr/share/doc/cairn/README.md", "644"],
    ["../../LICENSE-APACHE", "usr/share/doc/cairn/LICENSE-APACHE", "644"],
    ["../../LICENSE-MIT", "usr/share/doc/cairn/LICENSE-MIT", "644"],
    ["../../dist/deb/systemd/cairn.service", "usr/lib/systemd/user/cairn.service", "644"],
]
